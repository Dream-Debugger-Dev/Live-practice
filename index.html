<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z"
      crossorigin="anonymous"
    />
    <script
      src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
      integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
      integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"
      integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <div class="main-bg-container">
      <h1 class="main-heading">Retro Arcade Haven</h1>
      <div class="pac-man-container d-flex flex-column">
        <h2 class="pan-man-card-heading">Pac-Man</h2>
        <p class="pac-man-main-paragraph">
          Classic maze chase game that defined a generation!
        </p>
        <p class="pac-man-arcade">Arcade</p>
        <a href="#sectionDetails" class="view-details">View Details</a>
        <img
          src="https://s3.ap-south-1.amazonaws.com/new-assets.ccbp.in/frontend/loading-data/niat_static/niat_course_exams/html_hyperlinks_2_v3_img_1.jpg"
          class="pac-man-image"
        />
      </div>
      <h2 class="game-collection">Game Collection</h2>
      <div
        id="carouselExampleIndicators"
        class="carousel slide carousel-width"
        data-ride="carousel"
      >
        <!--carousel-->
        <ol class="carousel-indicators">
          <li
            data-target="#carouselExampleIndicators"
            data-slide-to="0"
            class="active"
          ></li>
          <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
          <li data-target="#carouselExampleIndicators" data-slide-to="2"></li>
        </ol>
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              src="https://s3.ap-south-1.amazonaws.com/new-assets.ccbp.in/frontend/loading-data/niat_static/niat_course_exams/html_hyperlinks_2_v3_img_2.jpg"
              class="d-block w-100"
              alt="..."
            />
          </div>
          <div class="carousel-item">
            <img
              src="https://s3.ap-south-1.amazonaws.com/new-assets.ccbp.in/frontend/loading-data/niat_static/niat_course_exams/html_hyperlinks_2_v3_img_3.jpg"
              class="d-block w-100"
              alt="..."
            />
          </div>
          <div class="carousel-item">
            <img
              src="https://s3.ap-south-1.amazonaws.com/new-assets.ccbp.in/frontend/loading-data/niat_static/niat_course_exams/html_hyperlinks_2_v3_img_4.jpg"
              class="d-block w-100"
              alt="..."
            />
          </div>
        </div>
        <a
          class="carousel-control-prev"
          href="#carouselExampleIndicators"
          role="button"
          data-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="sr-only">Previous</span>
        </a>
        <a
          class="carousel-control-next"
          href="#carouselExampleIndicators"
          role="button"
          data-slide="next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="sr-only">Next</span>
        </a>
      </div>
      <div
        class="game-collection-card-container d-flex flex-row justify-content-center"
      >
        <div
          class="game-collection-card d-flex flex-column justify-content-center"
        >
          <div>
            <img
              src="https://s3.ap-south-1.amazonaws.com/new-assets.ccbp.in/frontend/loading-data/niat_static/niat_course_exams/html_hyperlinks_2_v3_img_5.jpg"
              class="game-collection-image"
            />
          </div>
          <p class="game-collection-paragraph">
            Space invaders, <br />Shoot 'em up
          </p>
        </div>

        <div
          class="game-collection-card d-flex flex-column justify-content-center"
        >
          <div>
            <img
              src="https://s3.ap-south-1.amazonaws.com/new-assets.ccbp.in/frontend/loading-data/niat_static/niat_course_exams/html_hyperlinks_2_v3_img_6.jpg"
              class="game-collection-image"
            />
          </div>
          <p class="game-collection-paragraph">Tetris, Puzzle</p>
        </div>
      </div>

      <div class="Pac-man-details-container" id="sectionDetails">
        <h1>Pac-Man</h1>
      </div>
    </div>
  </body>
</html>
